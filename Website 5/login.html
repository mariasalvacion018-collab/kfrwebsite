<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KFR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
</head>
<body id="top" class="auth-page">
    <div class="auth-container">
        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form">
            <h2>Login</h2>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group password-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <i class='bx bx-show password-toggle' id="loginToggle" onclick="togglePassword('password', this)"></i>
            </div>
            <button type="submit" class="auth-btn">Login</button>
            <div class="switch">
                Don't have an account? <span class="switch-link" data-action="register">Register here</span>
            </div>
            <p class="message" id="loginMessage"></p>
            <p style="font-size:0.9rem; margin-top:8px; color:#666;">Admin test account: admin@kfr.com / Admin123!</p>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="auth-form" style="display: none;">
            <h2>Register</h2>
            <div class="input-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="input-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="input-group password-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required minlength="6">
                <i class='bx bx-show password-toggle' id="regToggle" onclick="togglePassword('regPassword', this)"></i>
            </div>
            <button type="submit" class="auth-btn">Register</button>
            <div class="switch">
                Already have an account? <span class="switch-link" data-action="login">Login here</span>
            </div>
            <p class="message" id="registerMessage"></p>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
